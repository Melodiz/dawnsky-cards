  function plural(n, one, few, many) {
    var m10 = n % 10, m100 = n % 100;
    if (m10 === 1 && m100 !== 11) return one;
    if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return few;

  var byHanzi = {};

    el.classList.remove('swap');
    void el.offsetWidth;
    el.classList.add('swap');
  }

  (function() {
    var d = new Date();

    var h = 0;
    for (var i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) >>> 0;
    setWotd(h % pool.length);

    var railHtml = '';
    for (var j = 0; j < letters.length; j++) {
      railHtml += '<a href="#sec-' + letters[j].l + '" title="' + nWords(letters[j].n) + '">' + letters[j].l + '</a>';
    }
    railEl.innerHTML = railHtml;
    railEl.style.display = '';
  }

  function renderResults(items) {
    railEl.style.display = 'none';
    if (!items.length) {
      listEl.innerHTML = '<div class="empty">ничего не нашлось ☁</div>';
      countEl.textContent = '0 / ' + WORDS.length;
      return;
    }
    var html = '<div class="letter-section"><div class="cols">';
    for (var i = 0; i < items.length; i++) html += rowHtml(items[i]);
    html += '</div></div>';
    listEl.innerHTML = html;
    countEl.textContent = items.length + ' / ' + WORDS.length;
  }

  var fuse = new Fuse(WORDS, {
    keys: [
      { name: 'pinyin_search', weight: 0.4 },
      { name: 'pinyin', weight: 0.2 },
      { name: 'hanzi', weight: 0.2 },
      { name: 'meaning_ru', weight: 0.15 },
      { name: 'meaning_en', weight: 0.05 }
    ],
    threshold: 0.4,
    distance: 100,
    includeScore: true,
    minMatchCharLength: 1
  });

  function stripTones(s) {
    return s.normalize('NFD').replace(/[̀-ͯ]/g, '')
            .replace(/ü/g, 'v').replace(/Ü/g, 'V').toLowerCase();
  }

  function doSearch() {
    var q = searchEl.value.trim();
    if (!q) { renderGrouped(); return; }
    var results = fuse.search(stripTones(q));
    var items = [];
    for (var i = 0; i < results.length; i++) items.push(results[i].item);
    renderResults(items);
  }

  var timer = null;
  searchEl.addEventListener('input', function() {
    clearTimeout(timer);
    timer = setTimeout(doSearch, 150);
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === '/' && document.activeElement !== searchEl) {
      e.preventDefault();
      searchEl.focus();
    }
  });

  renderGrouped();
})();
</script>
</body>
</html>
