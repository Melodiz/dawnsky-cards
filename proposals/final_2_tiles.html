<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#03050e">
<title>DawnSky 霏昊 · vocabulary — final 2 · tiles</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');

  :root {
    --bg: #03050e;
    --card: rgba(140,168,200,0.045);
    --ink: #e4dcc8;
    --soft: #c4b5a3;
    --accent: #d89888;
    --cool: #8ca8c8;
    --muted: #6e7588;
    --divider: rgba(140,168,200,0.11);
    --serif: 'Cormorant Garamond', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 75% 8%, rgba(216,152,136,0.10) 0%, transparent 45%),
      radial-gradient(ellipse at 12% 90%, rgba(140,168,200,0.07) 0%, transparent 55%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    padding: 0 1.25rem 2rem;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 880px; margin: 0 auto; }

  /* === WORD OF THE DAY === */
  .wotd {
    display: block;
    text-decoration: none;
    color: inherit;
    padding: 2.6rem 0 1.8rem;
  }

  .wotd-label {
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--cool);
    opacity: 0.9;
    margin-bottom: 0.6rem;
  }

  .wotd-row {
    display: flex;
    align-items: flex-end;
    gap: 1.2rem;
    flex-wrap: wrap;
  }

  .wotd-hz {
    font-family: 'Noto Serif SC', serif;
    font-size: 4.4rem;
    font-weight: 900;
    line-height: 1;
    color: var(--ink);
    animation: breathe 6s ease-in-out infinite;
    transition: color 0.3s;
  }
  .wotd:hover .wotd-hz { color: var(--accent); }

  @keyframes breathe {
    0%, 100% { text-shadow: 0 0 30px rgba(216,152,136,0.12); }
    50%      { text-shadow: 0 0 55px rgba(216,152,136,0.30); }
  }
  @media (prefers-reduced-motion: reduce) {
    .wotd-hz { animation: none; text-shadow: 0 0 40px rgba(216,152,136,0.18); }
  }

  .wotd-side { padding-bottom: 0.35rem; max-width: 26rem; }
  .wotd-py {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 1.3rem;
    color: var(--muted);
  }
  .wotd-ru { font-size: 0.86rem; font-weight: 500; color: var(--soft); margin-top: 0.2rem; }

  .wotd-teaser {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.95rem;
    color: var(--accent);
    opacity: 0.85;
    margin-top: 0.35rem;
    line-height: 1.45;
  }

  .wotd-actions {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    margin-top: 0.5rem;
  }

  .wotd-open {
    font-size: 0.68rem;
    color: var(--muted);
    opacity: 0.8;
    transition: color 0.3s;
  }
  .wotd:hover .wotd-open { color: var(--accent); }

  .wotd-more {
    background: none;
    border: 1px solid var(--divider);
    border-radius: 999px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.62rem;
    padding: 0.15rem 0.7rem;
    cursor: pointer;
    transition: border-color 0.25s, color 0.25s;
    -webkit-tap-highlight-color: transparent;
  }
  .wotd-more:hover { border-color: rgba(216,152,136,0.5); color: var(--accent); }

  .swap { animation: swap-in 0.4s ease both; }
  @keyframes swap-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .swap { animation: none; }
  }

  .hero-bar {
    height: 1px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--cool) 70%, transparent 100%);
    opacity: 0.25;
  }

  /* === HEADER === */
  .sticky-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(3,5,14,0.82);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 0.9rem 0 0.7rem;
  }

  .search-row { display: flex; align-items: center; gap: 0.9rem; }

  .brand {
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    font-size: 1.05rem;
    white-space: nowrap;
  }
  .brand span { color: var(--accent); }

  .search-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--divider);
    border-radius: 12px;
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    padding: 0.55rem 1.1rem;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus {
    border-color: rgba(216,152,136,0.45);
    box-shadow: 0 0 24px rgba(216,152,136,0.07);
  }

  .word-count {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    font-family: var(--serif);
    font-style: italic;
  }

  /* === LETTER SECTIONS === */
  .letter-section { margin-top: 2rem; }

  .letter-head {
    display: flex;
    align-items: baseline;
    gap: 0.9rem;
    margin-bottom: 0.9rem;
  }

  .letter-head .letter {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 2.1rem;
    line-height: 1;
    color: var(--cool);
    opacity: 0.75;
  }

  .letter-head .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--cool) 0%, transparent 80%);
    opacity: 0.18;
  }

  .letter-head .stat {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* === TILES === */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
    gap: 0.55rem;
  }

  .tile {
    display: block;
    min-width: 0;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    text-align: center;
    background: var(--card);
    border: 1px solid transparent;
    border-radius: 12px;
    padding: 0.85rem 0.45rem 0.7rem;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease,
                border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .tile.in { opacity: 1; transform: none; }

  .tile:hover {
    border-color: rgba(216,152,136,0.35);
    background: rgba(216,152,136,0.05);
    box-shadow: 0 6px 28px rgba(216,152,136,0.10);
    transform: translateY(-2px);
    transition-delay: 0ms !important;
  }

  .tile .hz {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.55rem;
    font-weight: 700;
    line-height: 1.25;
    color: var(--ink);
    transition: color 0.25s;
  }
  .tile:hover .hz { color: var(--accent); }

  .tile .py {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 0.1rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tile .ru {
    font-size: 0.66rem;
    color: var(--soft);
    margin-top: 0.25rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.85;
  }

  .empty {
    text-align: center;
    font-family: var(--serif);
    font-style: italic;
    color: var(--muted);
    padding: 4rem 0;
    font-size: 1.05rem;
  }

  .footer {
    text-align: center;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 3rem;
    opacity: 0.7;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.45rem; }
    .tile .hz { font-size: 1.35rem; }
    .wotd-hz { font-size: 3.2rem; }
    .brand { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .tile { opacity: 1; transform: none; transition: border-color 0.25s, box-shadow 0.25s, background 0.25s; }
  }
</style>
</head>
<body>
<div class="container">

  <a class="wotd" id="wotd" href="#">
    <div class="wotd-label">✦ слово дня</div>
    <div class="wotd-row" id="wotd-swap">
      <div class="wotd-hz" id="wotd-hz"></div>
      <div class="wotd-side">
        <div class="wotd-py" id="wotd-py"></div>
        <div class="wotd-ru" id="wotd-ru"></div>
        <div class="wotd-teaser" id="wotd-teaser"></div>
        <div class="wotd-actions">
          <span class="wotd-open">открыть карточку →</span>
          <button class="wotd-more" id="wotd-more">ещё ✦</button>
        </div>
      </div>
    </div>
  </a>
  <div class="hero-bar"></div>

  <div class="sticky-header">
    <div class="search-row">
      <div class="brand">DawnSky <span>霏昊</span></div>
      <input type="text" class="search-input" id="search" placeholder="pinyin, значение, 汉字…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <span class="word-count" id="count"></span>
    </div>
  </div>

  <div id="list"></div>
  <div class="footer">DawnSky 霏昊 · vocabulary</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<script src="words_data.js"></script>
<script src="interesting_words.js"></script>
<script>
(function() {
  var listEl = document.getElementById('list');
  var countEl = document.getElementById('count');
  var searchEl = document.getElementById('search');
  var URL_PREFIX = '../';

  function plural(n, one, few, many) {
    var m10 = n % 10, m100 = n % 100;
    if (m10 === 1 && m100 !== 11) return one;
    if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return few;
    return many;
  }
  function nWords(n) { return n + ' ' + plural(n, 'слово', 'слова', 'слов'); }

  /* --- word of the day from the "interesting" pool --- */
  var byHanzi = {};
  for (var i = 0; i < WORDS.length; i++) byHanzi[WORDS[i].hanzi] = WORDS[i];
  var pool = [];
  for (var j = 0; j < INTERESTING.length; j++) {
    var w = byHanzi[INTERESTING[j].hanzi];
    if (w) pool.push({ w: w, teaser: INTERESTING[j].teaser });
  }

  var wotdIdx = -1;
  function setWotd(idx) {
    wotdIdx = idx;
    var p = pool[idx];
    document.getElementById('wotd-hz').textContent = p.w.hanzi;
    document.getElementById('wotd-py').textContent = p.w.pinyin;
    document.getElementById('wotd-ru').textContent = p.w.meaning_ru;
    document.getElementById('wotd-teaser').textContent = p.teaser;
    document.getElementById('wotd').href = URL_PREFIX + p.w.url;
    var el = document.getElementById('wotd-swap');
    el.classList.remove('swap');
    void el.offsetWidth;
    el.classList.add('swap');
  }

  (function() {
    var d = new Date();
    var key = d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
    var h = 0;
    for (var i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) >>> 0;
    setWotd(h % pool.length);
  })();

  document.getElementById('wotd-more').addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    var idx;
    do { idx = Math.floor(Math.random() * pool.length); } while (idx === wotdIdx);
    setWotd(idx);
  });

  /* --- tiles --- */
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var io = ('IntersectionObserver' in window) && !reduceMotion
    ? new IntersectionObserver(function(entries) {
        for (var i = 0; i < entries.length; i++) {
          if (entries[i].isIntersecting) {
            entries[i].target.style.transitionDelay = (Math.min(i, 14) * 28) + 'ms';
            entries[i].target.classList.add('in');
            io.unobserve(entries[i].target);
          }
        }
      }, { rootMargin: '60px' })
    : null;

  function tileHtml(w) {
    return '<a class="tile' + (io ? '' : ' in') + '" href="' + URL_PREFIX + w.url + '">'
         + '<div class="hz">' + w.hanzi + '</div>'
         + '<div class="py">' + w.pinyin + '</div>'
         + '<div class="ru">' + w.meaning_ru + '</div>'
         + '</a>';
  }

  function observeTiles() {
    if (!io) return;
    var tiles = listEl.querySelectorAll('.tile:not(.in)');
    for (var i = 0; i < tiles.length; i++) io.observe(tiles[i]);
  }

  function letterOf(w) {
    var c = (w.pinyin_search || '#').charAt(0).toLowerCase();
    return (c >= 'a' && c <= 'z') ? c : '#';
  }

  function renderGrouped() {
    var html = '';
    var current = null, buf = [];

    function flush(letter) {
      if (!buf.length) return;
      html += '<div class="letter-section">'
            + '<div class="letter-head"><span class="letter">' + letter + '</span>'
            + '<span class="line"></span><span class="stat">' + nWords(buf.length) + '</span></div>'
            + '<div class="grid">' + buf.join('') + '</div></div>';
      buf = [];
    }

    for (var i = 0; i < WORDS.length; i++) {
      var l = letterOf(WORDS[i]);
      if (l !== current) { flush(current); current = l; }
      buf.push(tileHtml(WORDS[i]));
    }
    flush(current);

    listEl.innerHTML = html;
    countEl.textContent = nWords(WORDS.length);
    observeTiles();
  }

  function renderResults(items) {
    if (!items.length) {
      listEl.innerHTML = '<div class="empty">ничего не нашлось ☁</div>';
    } else {
      var html = '<div class="letter-section"><div class="grid">';
      for (var i = 0; i < items.length; i++) html += tileHtml(items[i]);
      html += '</div></div>';
      listEl.innerHTML = html;
    }
    countEl.textContent = items.length + ' / ' + WORDS.length;
    observeTiles();
  }

  var fuse = new Fuse(WORDS, {
    keys: [
      { name: 'pinyin_search', weight: 0.4 },
      { name: 'pinyin', weight: 0.2 },
      { name: 'hanzi', weight: 0.2 },
      { name: 'meaning_ru', weight: 0.15 },
      { name: 'meaning_en', weight: 0.05 }
    ],
    threshold: 0.4,
    distance: 100,
    includeScore: true,
    minMatchCharLength: 1
  });

  function stripTones(s) {
    return s.normalize('NFD').replace(/[̀-ͯ]/g, '')
            .replace(/ü/g, 'v').replace(/Ü/g, 'V').toLowerCase();
  }

  function doSearch() {
    var q = searchEl.value.trim();
    if (!q) { renderGrouped(); return; }
    var results = fuse.search(stripTones(q));
    var items = [];
    for (var i = 0; i < results.length; i++) items.push(results[i].item);
    renderResults(items);
  }

  var timer = null;
  searchEl.addEventListener('input', function() {
    clearTimeout(timer);
    timer = setTimeout(doSearch, 150);
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === '/' && document.activeElement !== searchEl) {
      e.preventDefault();
      searchEl.focus();
    }
  });

  renderGrouped();
})();
</script>
</body>
</html>
